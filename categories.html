<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories | Nagarkot Network Admin</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-store"/>
  <style>
    :root{--red:#C0272D;--red-dk:#8B1A1E;--cream:#FDF8F3;--ink:#1A1410;--muted:#6B6460;--border:#E8E0D8;--gold:#D4A853;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);}
    h1,h2,h3{font-family:'Playfair Display',serif;}
    .sidebar{width:240px;background:var(--ink);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;}
    .sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
    .sidebar-logo .nn{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#fff;line-height:1.1;}
    .red-dot{display:inline-block;width:7px;height:7px;background:var(--red);border-radius:50%;margin-left:2px;vertical-align:middle;margin-bottom:3px;}
    .sidebar-logo .sub{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
    nav.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
    .nav-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.25);padding:12px 12px 6px;}
    .nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,0.55);font-size:13.5px;font-weight:500;text-decoration:none;transition:all 0.18s;margin-bottom:2px;}
    .nav-link:hover{background:rgba(255,255,255,0.07);color:#fff;}
    .nav-link.active{background:var(--red);color:#fff;}
    .nav-link svg{width:17px;height:17px;flex-shrink:0;}
    .fb-badge{margin-left:auto;background:#1877F2;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;}
    .sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,0.08);}
    .logout-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;background:rgba(192,39,45,0.15);color:#F87171;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all 0.18s;}
    .logout-btn:hover{background:rgba(192,39,45,0.3);}
    .main-wrap{margin-left:240px;min-height:100vh;display:flex;flex-direction:column;flex:1;min-width:0;width:calc(100% - 240px);}
    .topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
    .topbar-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
    .page-content{flex:1;padding:32px;}

    /* Stats */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
    .stat-mini{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 22px;}
    .stat-mini .num{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1;}
    .stat-mini .lbl{font-size:12px;color:var(--muted);margin-top:4px;}

    /* Category grid */
    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
    .cat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px;transition:all 0.2s;position:relative;overflow:hidden;}
    .cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .cat-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(26,20,16,0.08);}
    .cat-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
    .cat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
    .cat-edit-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:6px;transition:all 0.15s;}
    .cat-edit-btn:hover{color:var(--ink);background:#F0EBE5;}
    .cat-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:2px;}
    .cat-en{font-size:13px;color:var(--muted);margin-bottom:6px;}
    .cat-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px;}
    .cat-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);}
    .cat-count{font-size:13px;font-weight:600;color:var(--ink);}
    .color-dot{width:12px;height:12px;border-radius:50%;}

    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;align-items:center;justify-content:center;padding:24px;}
    .modal-box{background:#fff;border-radius:16px;width:100%;max-width:480px;}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .modal-header h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
    .modal-close{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;}
    .modal-body{padding:24px;}
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
    .field input,.field textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--ink);outline:none;transition:border-color 0.18s;}
    .field input:focus,.field textarea:focus{border-color:var(--red);}
    .color-row{display:flex;gap:10px;align-items:center;}
    .color-row input[type=color]{width:48px;height:40px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;padding:2px;}
    .color-row input[type=text]{flex:1;}
    .modal-actions{display:flex;gap:10px;padding:0 24px 24px;}
    .btn-save{flex:1;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
    .btn-save:hover{background:var(--red-dk);}
    .btn-cancel{padding:12px 20px;background:#fff;color:var(--ink);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
  </style>
</head>
<body>

<script>
  const SUPABASE_URL="https://waqfebkbgyfhybompnsm.supabase.co";
  const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndhcWZlYmtiZ3lmaHlib21wbnNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5MDE5MzQsImV4cCI6MjA4MTQ3NzkzNH0.0WttHhOGKaP60ixIkT1MnqV4jbxgteN68ez-nCYU16c";

  const supabaseClient=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  supabaseClient.auth.getSession().then(({data})=>{if(!data.session)window.location.replace("login.html");});
</script>

<div style="display:flex;min-height:100vh;width:100%;">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="nn">नगरकोट<span class="red-dot"></span><br>Network</div>
      <div class="sub">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main</div>
      <a href="dashboard.html" class="nav-link"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>Dashboard</a>
      <a href="post-news.html" class="nav-link"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>Post News</a>
      <a href="all-news.html" class="nav-link"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>All News</a>
      <a href="categories.html" class="nav-link active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>Categories</a>
      <div class="nav-label" style="margin-top:8px;">Integrations</div>
      <a href="settings.html" class="nav-link"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>Facebook Sync<span class="fb-badge">NEW</span></a>
      <a href="settings.html" class="nav-link"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Settings</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" class="logout-btn"><svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</button></div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">Categories</div>
      <button onclick="openModal()" style="padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;">
        <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        Add Category
      </button>
    </header>

    <main class="page-content">
      <div class="stats-row">
        <div class="stat-mini"><div class="num" id="totalCats">8</div><div class="lbl">Total Categories</div></div>
        <div class="stat-mini"><div class="num" id="totalArts">—</div><div class="lbl">Total Articles</div></div>
        <div class="stat-mini"><div class="num" id="popularCat" style="font-size:18px;padding-top:5px;">—</div><div class="lbl">Most Popular</div></div>
      </div>

      <div class="cat-grid" id="catGrid">
        <!-- loaded by JS -->
      </div>
    </main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="catModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Add Category</h3>
      <button class="modal-close" onclick="closeModal()"><svg style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editCatName"/>
      <div class="field"><label>Nepali Name *</label><input type="text" id="catName" placeholder="समाचार"/></div>
      <div class="field"><label>English Name</label><input type="text" id="catEn" placeholder="News"/></div>
      <div class="field"><label>Description</label><textarea id="catDesc" rows="3" placeholder="Brief description…"></textarea></div>
      <div class="field"><label>Color</label>
        <div class="color-row">
          <input type="color" id="catColorPicker" value="#C0272D" oninput="document.getElementById('catColorText').value=this.value"/>
          <input type="text" id="catColorText" value="#C0272D" oninput="document.getElementById('catColorPicker').value=this.value"/>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="submitCat()"><span id="submitLabel">Add Category</span></button>
    </div>
  </div>
</div>

<script>
  const CATEGORIES = [
    {name:'समाचार',english:'News',description:'General news and updates',color:'#C0272D',icon:'📰'},
    {name:'राजनीति',english:'Politics',description:'Political news and analysis',color:'#1D4ED8',icon:'🏛️'},
    {name:'शिक्षा',english:'Education',description:'Education and academic news',color:'#16A34A',icon:'🎓'},
    {name:'प्रविधि',english:'Technology',description:'Technology and innovation',color:'#7C3AED',icon:'💻'},
    {name:'खेलकुद',english:'Sports',description:'Sports news and events',color:'#D97706',icon:'⚽'},
    {name:'अर्थ',english:'Economy',description:'Economic and business news',color:'#0891B2',icon:'📈'},
    {name:'मनोरञ्जन',english:'Entertainment',description:'Entertainment and culture',color:'#DB2777',icon:'🎭'},
    {name:'स्वास्थ्य',english:'Health',description:'Health and wellness',color:'#0D9488',icon:'🏥'},
  ];

  let allNews=[], isEdit=false;
  document.addEventListener('DOMContentLoaded', loadData);

  async function loadData() {
    const{data}=await supabaseClient.from('news').select('*');
    allNews=data||[];
    renderCards();
    updateStats();
  }

  function renderCards() {
    const counts={};
    allNews.forEach(n=>counts[n.category]=(counts[n.category]||0)+1);
    document.getElementById('catGrid').innerHTML = CATEGORIES.map(c=>`
      <div class="cat-card" style="--card-color:${c.color}">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${c.color};"></div>
        <div class="cat-card-top">
          <div class="cat-icon" style="background:${c.color}18;">${c.icon}</div>
          <button class="cat-edit-btn" onclick='editCat(${JSON.stringify(c)})'>
            <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
        </div>
        <div class="cat-name">${c.name}</div>
        <div class="cat-en">${c.english}</div>
        <div class="cat-desc">${c.description}</div>
        <div class="cat-footer">
          <div class="cat-count">
            <svg style="width:14px;height:14px;vertical-align:middle;margin-right:4px;color:var(--muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            ${counts[c.name]||0} articles
          </div>
          <div class="color-dot" style="background:${c.color};"></div>
        </div>
      </div>`).join('');
  }

  function updateStats() {
    const counts={};
    allNews.forEach(n=>counts[n.category]=(counts[n.category]||0)+1);
    const top=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('totalCats').textContent=CATEGORIES.length;
    document.getElementById('totalArts').textContent=allNews.length;
    document.getElementById('popularCat').textContent=top?`${top[0]} (${top[1]})`:'No data';
  }

  function openModal(){isEdit=false;document.getElementById('modalTitle').textContent='Add Category';document.getElementById('submitLabel').textContent='Add Category';document.getElementById('catName').value='';document.getElementById('catEn').value='';document.getElementById('catDesc').value='';document.getElementById('catColorPicker').value='#C0272D';document.getElementById('catColorText').value='#C0272D';document.getElementById('catModal').style.display='flex';}
  function editCat(c){isEdit=true;document.getElementById('modalTitle').textContent='Edit Category';document.getElementById('submitLabel').textContent='Save Changes';document.getElementById('editCatName').value=c.name;document.getElementById('catName').value=c.name;document.getElementById('catEn').value=c.english||'';document.getElementById('catDesc').value=c.description||'';document.getElementById('catColorPicker').value=c.color;document.getElementById('catColorText').value=c.color;document.getElementById('catModal').style.display='flex';}
  function closeModal(){document.getElementById('catModal').style.display='none';}
  function submitCat(){if(isEdit){alert('Category updated! (In production, stored in database.)');}else{alert('Category added! (In production, stored in database.)');}closeModal();}

  async function logout(){await supabaseClient.auth.signOut();window.location.replace('login.html');}
</script>
</body>
</html>
