<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All News | Nagarkot Network Admin</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-store"/>
  <style>
    :root{--red:#C0272D;--red-dk:#8B1A1E;--cream:#FDF8F3;--ink:#1A1410;--muted:#6B6460;--border:#E8E0D8;--gold:#D4A853;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);}
    h1,h2,h3{font-family:'Playfair Display',serif;}

    /* Sidebar */
    .sidebar{width:240px;background:var(--ink);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;}
    .sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
    .sidebar-logo .nn{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#fff;line-height:1.1;}
    .red-dot{display:inline-block;width:7px;height:7px;background:var(--red);border-radius:50%;margin-left:2px;vertical-align:middle;margin-bottom:3px;}
    .sidebar-logo .sub{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
    nav.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
    .nav-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.25);padding:12px 12px 6px;}
    .nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,0.55);font-size:13.5px;font-weight:500;text-decoration:none;transition:all 0.18s;margin-bottom:2px;}
    .nav-link:hover{background:rgba(255,255,255,0.07);color:#fff;}
    .nav-link.active{background:var(--red);color:#fff;}
    .nav-link svg{width:17px;height:17px;flex-shrink:0;}
    .fb-badge{margin-left:auto;background:#1877F2;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;}
    .sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,0.08);}
    .logout-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;background:rgba(192,39,45,0.15);color:#F87171;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all 0.18s;}
    .logout-btn:hover{background:rgba(192,39,45,0.3);}

    .main-wrap{margin-left:240px;min-height:100vh;display:flex;flex-direction:column;flex:1;min-width:0;width:calc(100% - 240px);}
    .topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
    .topbar-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
    .page-content{flex:1;padding:32px;}

    /* Stats row */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
    .stat-mini{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;}
    .stat-mini .num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1;}
    .stat-mini .lbl{font-size:12px;color:var(--muted);margin-top:4px;}

    /* Filter bar */
    .filter-bar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
    .filter-bar input,.filter-bar select{
      padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;
      font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);
      background:#fff;outline:none;transition:border-color 0.18s;
    }
    .filter-bar input:focus,.filter-bar select:focus{border-color:var(--red);}
    .filter-bar input{flex:1;min-width:180px;}
    .filter-bar select{min-width:140px;}
    .btn-clear{padding:9px 16px;background:transparent;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.18s;}
    .btn-clear:hover{border-color:var(--ink);color:var(--ink);}
    .btn-new{padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all 0.18s;}
    .btn-new:hover{background:var(--red-dk);}

    /* Table */
    .table-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    table{width:100%;border-collapse:collapse;font-size:13.5px;}
    thead tr{background:#FAFAF8;}
    thead th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);}
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:#FAFAF8;}
    td{padding:14px 16px;vertical-align:middle;}

    .news-title-cell .main{font-weight:600;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
    .news-title-cell .preview{font-size:12px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}

    .tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;}
    .tag.cat{background:#EFF6FF;color:#1D4ED8;}
    .tag.breaking{background:#FEF2F2;color:var(--red);}
    .tag.featured{background:#FFFBEB;color:#92400E;}
    .tag.fb{background:#EFF6FF;color:#1877F2;}

    .action-btn{padding:6px 12px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .action-btn.edit{background:#EFF6FF;color:#1D4ED8;}
    .action-btn.edit:hover{background:#DBEAFE;}
    .action-btn.delete{background:#FEF2F2;color:var(--red);}
    .action-btn.delete:hover{background:#FEE2E2;}

    /* Pagination */
    .table-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--muted);}
    .page-btns{display:flex;gap:8px;}
    .page-btn{padding:7px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;background:#fff;color:var(--ink);cursor:pointer;transition:all 0.15s;}
    .page-btn:hover:not(:disabled){border-color:var(--ink);}
    .page-btn:disabled{opacity:0.4;cursor:not-allowed;}

    /* Bulk bar */
    .bulk-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.25);display:none;align-items:center;gap:12px;font-size:13px;font-weight:500;z-index:50;}
    .bulk-btn{padding:6px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;}
    .bulk-btn.red{background:var(--red);color:#fff;}
    .bulk-btn.blue{background:#1877F2;color:#fff;}
    .bulk-btn.dk{background:#8B1A1E;color:#fff;}

    /* Edit modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;align-items:center;justify-content:center;padding:24px;}
    .modal-box{background:#fff;border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2;}
    .modal-header h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
    .modal-close{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:6px;}
    .modal-close:hover{color:var(--ink);background:#F0EBE5;}
    .modal-body{padding:24px;}
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
    .field input,.field select,.field textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--ink);outline:none;transition:border-color 0.18s;}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red);}
    .modal-actions{display:flex;gap:10px;padding:0 24px 24px;}
    .btn-save{flex:1;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
    .btn-cancel{padding:12px 20px;background:#fff;color:var(--ink);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
    .checks-row{display:flex;gap:20px;}
    .check-item{display:flex;align-items:center;gap:8px;font-size:13px;}
    .check-item input{width:16px;height:16px;accent-color:var(--red);}
    .skeleton{background:linear-gradient(90deg,#F0EBE5 25%,#E8E0D8 50%,#F0EBE5 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:39;}
    .mob-topbar-btn{display:none;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;color:var(--ink);}
    .mob-topbar-btn:hover{background:var(--border);}
    .mob-topbar-btn svg{width:22px;height:22px;}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%) !important;transition:transform 0.3s;}
      .sidebar.open{transform:translateX(0) !important;}
      .sidebar-overlay.open{display:block;}
      .main-wrap{margin-left:0 !important;width:100% !important;}
      .mob-topbar-btn{display:flex !important;align-items:center;justify-content:center;}
      .topbar{padding:0 16px !important;}
      .page-content{padding:16px !important;}
      .form-layout{grid-template-columns:1fr !important;}
      .stats-row{grid-template-columns:repeat(2,1fr) !important;}
      .settings-layout{grid-template-columns:1fr !important;}
      .cat-grid{grid-template-columns:1fr !important;}
      .filter-bar{flex-direction:column;}
      .filter-bar input,.filter-bar select{width:100%;}
    }
  </style>
</head>

  <div class="main-wrap">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="mob-topbar-btn" onclick="openSidebar()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>

    <main class="page-content">

        <div class="stat-mini"><div class="num" id="featuredCount">—</div><div class="lbl">Featured</div></div>
        <div class="stat-mini"><div class="num" id="monthCount">—</div><div class="lbl">This Month</div></div>
      </div>

      <div class="filter-bar">

      <input type="hidden" id="editId"/>
      <div class="field"><label>Title</label><input type="text" id="editTitle" required/></div>
      <div class="field"><label>Category</label>
        <select id="editCategory">
          <option value="समाचार">समाचार</option><option value="राजनीति">राजनीति</option>
          <option value="शिक्षा">शिक्षा</option><option value="प्रविधि">प्रविधि</option>
          <option value="खेलकुद">खेलकुद</option><option value="अर्थ">अर्थ</option>
          <option value="मनोरञ्जन">मनोरञ्जन</option><option value="स्वास्थ्य">स्वास्थ्य</option>

      </div>
      <div class="field"><label>Content</label><textarea id="editContent" rows="7" required></textarea></div>
      <div class="field">
        <label>Current Image</label>
        <div id="currentImgWrap" style="display:none;margin-bottom:10px;"><img id="currentImg" style="max-height:140px;border-radius:8px;border:1px solid var(--border);"/></div>
        <label for="editImageFile" style="display:inline-flex;align-items:center;gap:8px;padding:9px 16px;background:#EFF6FF;color:#1D4ED8;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px dashed #BFDBFE;">
          <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/></svg>
          Change Image
        </label>
        <input type="file" id="editImageFile" accept="image/*" style="display:none;" onchange="handleEditImg(event)"/>
        <input type="hidden" id="editImageUrl"/>
        <div id="editImgPreviewWrap" style="display:none;margin-top:10px;"><img id="editImgPreview" style="max-height:100px;border-radius:8px;"/></div>
      </div>
      <div class="field">
        <label>Flags</label>
        <div class="checks-row">
          <label class="check-item"><input type="checkbox" id="editBreaking"/> Breaking News</label>
          <label class="check-item"><input type="checkbox" id="editFeatured"/> Featured</label>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<script>
  let allNews=[], filteredNews=[], selectedIds=new Set(), currentPage=1, itemsPerPage=10, editImgFile=null;
  const BUCKET='news-images';

  document.addEventListener('DOMContentLoaded', loadNews);

  async function loadNews() {
    try {
      const {data,error} = await supabaseClient.from('news').select('*').order('created_at',{ascending:false});
      if(error) throw error;
      allNews = data||[];
      filteredNews = allNews;
      updateStats(); displayNews();
    } catch(e) {
      document.getElementById('newsTableBody').innerHTML=`<tr><td colspan="6" style="padding:40px;text-align:center;color:var(--red);">Error loading. Please refresh.</td></tr>`;
    }
  }

  function updateStats() {
    const now=new Date();
    document.getElementById('totalCount').textContent=allNews.length;
    document.getElementById('breakingCount').textContent=allNews.filter(n=>n.is_breaking).length;
    document.getElementById('featuredCount').textContent=allNews.filter(n=>n.is_featured).length;
    document.getElementById('monthCount').textContent=allNews.filter(n=>{const d=new Date(n.created_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  }

  function displayNews() {
    const start=(currentPage-1)*itemsPerPage, end=start+itemsPerPage;
    const page=filteredNews.slice(start,end);
    document.getElementById('totalNewsCount').textContent=filteredNews.length;
    document.getElementById('showingCount').textContent=Math.min(end,filteredNews.length);
    if(!page.length){
      document.getElementById('newsTableBody').innerHTML=`<tr><td colspan="6" style="padding:40px;text-align:center;color:var(--muted);">No articles found</td></tr>`;
      updatePagination(); return;
    }
    document.getElementById('newsTableBody').innerHTML = page.map(n=>`
      <tr>
        <td><input type="checkbox" class="news-checkbox" value="${n.id}" onchange="updateSelection()" style="accent-color:var(--red);width:15px;height:15px;" ${selectedIds.has(n.id)?'checked':''}></td>
        <td class="news-title-cell">
          <div class="main">${n.title}</div>
          <div class="preview">${(n.content||'').slice(0,60)}…</div>
        </td>
        <td><span class="tag cat">${n.category}</span></td>
        <td style="display:flex;gap:4px;flex-wrap:wrap;padding-top:14px;">
          ${n.is_breaking?'<span class="tag breaking">Breaking</span>':''}
          ${n.is_featured?'<span class="tag featured">Featured</span>':''}
          ${n.source==='facebook'?'<span class="tag fb">FB</span>':''}
        </td>
        <td style="font-size:12px;color:var(--muted);">${timeAgo(n.created_at)}</td>
        <td><div style="display:flex;gap:6px;">
          <button class="action-btn edit" onclick="openEdit(${n.id})">Edit</button>
          <button class="action-btn delete" onclick="deleteNews(${n.id})">Delete</button>
        </div></td>
      </tr>`).join('');
    updatePagination();
  }

  function filterNews() {
    const s=document.getElementById('searchInput').value.toLowerCase();
    const c=document.getElementById('categoryFilter').value;
    const st=document.getElementById('statusFilter').value;
    filteredNews=allNews.filter(n=>{
      const ms=!s||n.title.toLowerCase().includes(s)||n.content.toLowerCase().includes(s);
      const mc=!c||n.category===c;
      const mst=!st||(st==='breaking'&&n.is_breaking)||(st==='featured'&&n.is_featured)||(st==='facebook'&&n.source==='facebook');
      return ms&&mc&&mst;
    });
    currentPage=1; displayNews();
  }

  function clearFilters(){document.getElementById('searchInput').value='';document.getElementById('categoryFilter').value='';document.getElementById('statusFilter').value='';filterNews();}

  function updateSelection() {
    selectedIds.clear();
    document.querySelectorAll('.news-checkbox:checked').forEach(cb=>selectedIds.add(parseInt(cb.value)));
    const bar=document.getElementById('bulkBar');
    if(selectedIds.size>0){bar.style.display='flex';document.getElementById('selectedCount').textContent=selectedIds.size+' selected';}
    else bar.style.display='none';
  }
  function toggleSelectAll(){const c=document.getElementById('selectAll').checked;document.querySelectorAll('.news-checkbox').forEach(cb=>cb.checked=c);updateSelection();}
  function clearSelection(){selectedIds.clear();document.querySelectorAll('.news-checkbox').forEach(cb=>cb.checked=false);document.getElementById('selectAll').checked=false;updateSelection();}

  async function bulkToggleBreaking(){if(!confirm(`Toggle breaking for ${selectedIds.size} articles?`))return;for(const id of selectedIds){const n=allNews.find(x=>x.id===id);await supabaseClient.from('news').update({is_breaking:!n.is_breaking}).eq('id',id);}await loadNews();clearSelection();}
  async function bulkToggleFeatured(){if(!confirm(`Toggle featured for ${selectedIds.size} articles?`))return;for(const id of selectedIds){const n=allNews.find(x=>x.id===id);await supabaseClient.from('news').update({is_featured:!n.is_featured}).eq('id',id);}await loadNews();clearSelection();}
  async function bulkDelete(){if(!confirm(`Delete ${selectedIds.size} articles? Cannot be undone!`))return;for(const id of selectedIds){await supabaseClient.from('news').delete().eq('id',id);}await loadNews();clearSelection();}

  function openEdit(id){
    const n=allNews.find(x=>x.id===id); if(!n) return;
    document.getElementById('editId').value=n.id;
    document.getElementById('editTitle').value=n.title;
    document.getElementById('editCategory').value=n.category;
    document.getElementById('editContent').value=n.content;
    document.getElementById('editImageUrl').value=n.image_url||'';
    document.getElementById('editBreaking').checked=n.is_breaking;
    document.getElementById('editFeatured').checked=n.is_featured;
    const ciw=document.getElementById('currentImgWrap');
    if(n.image_url){document.getElementById('currentImg').src=n.image_url;ciw.style.display='block';}else ciw.style.display='none';
    editImgFile=null; document.getElementById('editImageFile').value=''; document.getElementById('editImgPreviewWrap').style.display='none';
    document.getElementById('editModal').style.display='flex';
  }
  function closeEditModal(){document.getElementById('editModal').style.display='none';}
  function handleEditImg(e){const f=e.target.files[0];if(!f)return;editImgFile=f;const r=new FileReader();r.onload=ev=>{document.getElementById('editImgPreview').src=ev.target.result;document.getElementById('editImgPreviewWrap').style.display='block';};r.readAsDataURL(f);}

  async function saveEdit(){
    const id=document.getElementById('editId').value;
    const updates={title:document.getElementById('editTitle').value,category:document.getElementById('editCategory').value,content:document.getElementById('editContent').value,is_breaking:document.getElementById('editBreaking').checked,is_featured:document.getElementById('editFeatured').checked};
    if(editImgFile){
      const ext=editImgFile.name.split('.').pop(), fn=`${Date.now()}.${ext}`;
      const{error:ue}=await supabaseClient.storage.from(BUCKET).upload(fn,editImgFile,{cacheControl:'3600',upsert:false});
      if(!ue){const{data:ud}=supabaseClient.storage.from(BUCKET).getPublicUrl(fn);updates.image_url=ud.publicUrl;}
    } else updates.image_url=document.getElementById('editImageUrl').value;
    const{error}=await supabaseClient.from('news').update(updates).eq('id',id);
    if(error){alert('Error: '+error.message);return;}
    closeEditModal(); await loadNews();
  }

  async function deleteNews(id){if(!confirm('Delete this article?'))return;const{error}=await supabaseClient.from('news').delete().eq('id',id);if(error){alert('Error: '+error.message);return;}await loadNews();}

  function updatePagination(){const t=Math.ceil(filteredNews.length/itemsPerPage);document.getElementById('prevBtn').disabled=currentPage===1;document.getElementById('nextBtn').disabled=currentPage>=t;}
  function previousPage(){if(currentPage>1){currentPage--;displayNews();window.scrollTo(0,0);}}
  function nextPage(){if(currentPage<Math.ceil(filteredNews.length/itemsPerPage)){currentPage++;displayNews();window.scrollTo(0,0);}}

  function timeAgo(d){const s=(Date.now()-new Date(d))/1000;if(s<60)return'Just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
  
  function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');}
  function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}

  async function logout(){await supabaseClient.auth.signOut();window.location.replace('login.html');}
</script>
</body>
</html>
